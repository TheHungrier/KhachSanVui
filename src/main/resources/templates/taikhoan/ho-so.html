<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <meta charset="UTF-8">
    <title th:text="'Hồ sơ cá nhân — ' + ${khachHang.hoTen} + ' — KhachSanVui'">
        Hồ sơ cá nhân — KhachSanVui
    </title>
</head>
<body>
<section layout:fragment="content">

    <section class="ksv-profile-section">
        <form th:action="@{/tai-khoan/ho-so/cap-nhat}"
              method="post"
              id="profileForm"
              enctype="multipart/form-data"
              novalidate>

            <div class="ksv-profile-wrap">

                <aside class="ksv-profile-sidebar">
                    <div class="ksv-profile-card ksv-profile-identity">
                        <div class="ksv-avatar-wrap" style="cursor: pointer;"
                             onclick="document.getElementById('avatarInput').click();">
                            <img th:src="@{/images/avatars/{f}(f=${khachHang.hinhAnh != null ? khachHang.hinhAnh : 'avatar-default.png'})}"
                                 th:alt="${khachHang.hoTen}"
                                 id="avatarPreview"
                                 class="ksv-avatar-img">
                            <input type="file" id="avatarInput" name="avatarFile" accept="image/*"
                                   style="display: none;">
                        </div>

                        <p class="ksv-profile-name" th:text="${khachHang.hoTen}">Nguyễn Đức Anh</p>
                        <p class="ksv-profile-handle" th:text="${khachHang.email}"
                           style="color: var(--muted); font-size: 13px;">ducanh@gmail.com</p>

                        <div class="ksv-profile-divider"
                             style="border-top: 1px solid var(--border); margin: 16px 0; width: 100%;"></div>

                        <div class="ksv-profile-quick-contact"
                             style="width: 100%; text-align: left; display: flex; flex-direction: column; gap: 10px; font-size: 13.5px;">
                            <p style="margin: 0; color: var(--muted);">
                                <i class="fa-solid fa-phone" style="width: 18px; color: var(--blue);"></i>
                                <span th:text="${khachHang.soDienThoai != null and !khachHang.soDienThoai.isEmpty() ? khachHang.soDienThoai : 'Chưa cập nhật'}">0901 234 567</span>
                            </p>
                            <p style="margin: 0; color: var(--muted); word-break: break-all;">
                                <i class="fa-regular fa-envelope" style="width: 18px; color: var(--blue);"></i>
                                <span th:text="${khachHang.email}">ducanh@gmail.com</span>
                            </p>

                            <p style="margin: 0; color: var(--muted);">
                                <i class="fa-solid fa-shield-halved" style="width: 18px; color: var(--blue);"></i>
                                Trạng thái:
                                <span th:if="${session.USER_LOGIN != null}"
                                      th:text="${session.USER_LOGIN.trangThai}"
                                      th:style="${session.USER_LOGIN.trangThai == 'Hoạt động' ? 'color: #28a745; font-weight: 600;' : 'color: #dc3545; font-weight: 600;'}">
                                    Hoạt động
                                </span>
                                <span th:if="${session.USER_LOGIN == null}" style="color: #ffc107; font-weight: 600;">Chưa rõ</span>
                            </p>
                        </div>
                    </div>

                    <nav class="ksv-profile-card ksv-profile-nav" aria-label="Điều hướng hồ sơ cá nhân"
                         style="display: flex; flex-direction: column; gap: 4px;">
                        <a th:href="@{/tai-khoan/ho-so}"
                           th:classappend="${#strings.contains(#execInfo.templateName, 'ho-so') ? 'ksv-nav-link--active' : ''}"
                           class="ksv-nav-link">
                            <i class="fa-solid fa-user" aria-hidden="true"></i>
                            Thông tin cá nhân
                        </a>
                        <a th:href="@{/tai-khoan/doi-mat-khau}"
                           th:classappend="${#strings.contains(#execInfo.templateName, 'doi-mat-khau') ? 'ksv-nav-link--active' : ''}"
                           class="ksv-nav-link">
                            <i class="fa-solid fa-lock" aria-hidden="true"></i>
                            Đổi mật khẩu
                        </a>

                        <div style="border-top: 1px solid var(--border); margin: 8px 0; width: 100%;"></div>

                        <button type="button" onclick="confirmDeleteAccount();" class="ksv-nav-link"
                                style="width: 100%; text-align: left; background: none; border: none; font-family: inherit; font-size: inherit; cursor: pointer; color: var(--danger);">
                            <i class="fa-solid fa-trash-can" aria-hidden="true"></i>
                            Xóa tài khoản
                        </button>
                    </nav>
                </aside>

                <main class="ksv-profile-main">

                    <article class="ksv-profile-card ksv-profile-form-card">

                        <header class="ksv-form-head">
                            <h2>Thông tin cá nhân</h2>
                            <p>Cập nhật thông tin của bạn để làm thủ tục nhận phòng tại quầy nhanh chóng hơn.</p>
                        </header>

                        <div class="ksv-form-grid">

                            <div class="ksv-form-group">
                                <label for="hoTen">
                                    <i class="fa-solid fa-user" aria-hidden="true"></i>
                                    Họ và tên
                                </label>
                                <input type="text"
                                       id="hoTen"
                                       name="hoTen"
                                       th:value="${khachHang.hoTen}"
                                       placeholder="Nhập họ và tên đầy đủ"
                                       autocomplete="name"
                                       required>
                            </div>

                            <div class="ksv-form-group">
                                <label for="soDienThoai">
                                    <i class="fa-solid fa-phone" aria-hidden="true"></i>
                                    Số điện thoại
                                </label>
                                <input type="tel"
                                       id="soDienThoai"
                                       name="soDienThoai"
                                       th:value="${khachHang.soDienThoai}"
                                       placeholder="0901 234 567"
                                       autocomplete="tel">
                            </div>

                            <div class="ksv-form-group">
                                <label for="email">
                                    <i class="fa-regular fa-envelope" aria-hidden="true"></i>
                                    Địa chỉ Email
                                </label>
                                <div class="ksv-input-wrap">
                                    <input type="email"
                                           id="email"
                                           name="email"
                                           th:value="${khachHang.email}"
                                           disabled
                                           aria-describedby="emailHint">
                                    <span class="ksv-input-badge" id="emailHint">Mặc định</span>
                                </div>
                            </div>

                            <div class="ksv-form-group">
                                <label for="cccd">
                                    <i class="fa-solid fa-id-card" aria-hidden="true"></i>
                                    Số CCCD
                                    <span class="ksv-required" aria-label="Bắt buộc">*</span>
                                </label>
                                <div class="ksv-input-wrap">
                                    <input type="text"
                                           id="cccd"
                                           name="cccd"
                                           th:value="${khachHang.cccd}"
                                           disabled
                                           aria-describedby="cccdHint">
                                    <span class="ksv-input-badge" id="cccdHint">Mặc định</span>
                                </div>
                            </div>

                            <div class="ksv-form-group">
                                <label for="ngaySinh">
                                    <i class="fa-solid fa-cake-candles" aria-hidden="true"></i>
                                    Ngày sinh
                                </label>
                                <input type="date"
                                       id="ngaySinh"
                                       name="ngaySinh"
                                       th:value="${khachHang.ngaySinh != null ? #temporals.format(khachHang.ngaySinh, 'yyyy-MM-dd') : ''}"
                                       max="2008-01-01">
                            </div>

                            <div class="ksv-form-group">
                                <label for="gioiTinh">
                                    <i class="fa-solid fa-venus-mars" aria-hidden="true"></i>
                                    Giới tính
                                </label>
                                <select id="gioiTinh" name="gioiTinh">
                                    <option value="Nam" th:selected="${khachHang.gioiTinh == 'Nam'}">Nam</option>
                                    <option value="Nữ" th:selected="${khachHang.gioiTinh == 'Nữ'}">Nữ</option>
                                    <option value="Khác" th:selected="${khachHang.gioiTinh == 'Khác'}">Khác</option>
                                </select>
                            </div>

                            <div class="ksv-form-group">
                                <label for="diaChi">
                                    <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
                                    Địa chỉ cư trú
                                </label>
                                <input type="text"
                                       id="diaChi"
                                       name="diaChi"
                                       th:value="${khachHang.diaChi}"
                                       placeholder="Số nhà, tên đường, phường/xã, quận/huyện, tỉnh/thành...">
                            </div>

                        </div>
                        <div class="ksv-form-actions">
                            <button type="submit" class="ksv-btn ksv-btn-save">
                                <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
                                Lưu thay đổi
                            </button>
                        </div>

                    </article>

                </main>
            </div>
        </form>
    </section>

    <div style="display: none;">
        <form id="deleteAccountForm" th:action="@{/tai-khoan/xoa-tai-khoan}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>
    </div>

    <script>
        document.getElementById('avatarInput').addEventListener('change', function (event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById('avatarPreview').src = e.target.result;
            }
            reader.readAsDataURL(file);
        });

        function confirmDeleteAccount() {
            if (confirm("CẢNH BÁO: Bạn có chắc chắn muốn xóa tài khoản này không?\nHành động này không thể hoàn tác và toàn bộ dữ liệu cá nhân của bạn sẽ bị xóa sạch khỏi hệ thống!")) {
                document.getElementById('deleteAccountForm').submit();
            }
        }
    </script>
</section>
</body>
</html>
