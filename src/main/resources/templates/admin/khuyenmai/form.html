<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title th:text="${formTitle}">Biểu mẫu chương trình khuyến mãi</title>
</head>
<body>
<section layout:fragment="content">
    <div class="ksv-form-container">
        <div class="ksv-form-header">
            <div class="ksv-form-header-title">
                <h1 th:text="${formTitle}">Biểu mẫu chiến dịch khuyến mãi</h1>
                <p>Thiết lập mã CODE định danh, giá trị phần trăm hoặc tiền mặt, thời hiệu chiến dịch và giới hạn
                    voucher.</p>
            </div>
            <a class="ksv-btn-back" th:href="@{/khuyen-mai/admin}">
                <i class="fa-solid fa-arrow-left"></i> Quay lại danh sách
            </a>
        </div>

        <form th:action="@{/khuyen-mai/admin/luu}" th:object="${khuyenMai}" method="post">
            <div th:if="${error}" class="ksv-alert">
                <i class="fa-solid fa-circle-xmark"></i>
                <span th:text="${error}"></span>
            </div>

            <input type="hidden" th:field="*{maKhuyenMai}">
            <input type="hidden" th:field="*{hinhAnh}">
            <input type="hidden" th:field="*{soLuongDaDat}">

            <div class="ksv-form-grid">
                <div class="ksv-form-group">
                    <label>Mã nhận diện Voucher (MÃ CODE)</label>
                    <input class="ksv-form-input" th:field="*{maCode}" placeholder="Ví dụ: VUIHE2026, SUMMER50..."
                           style="font-family: monospace; font-weight: 700; text-transform: uppercase;" required>
                </div>

                <div class="ksv-form-group">
                    <label>Tên chương trình chiến dịch khuyến mãi</label>
                    <input class="ksv-form-input" th:field="*{tenKhuyenMai}"
                           placeholder="Nhập tên gọi hiển thị của chiến dịch..." required maxlength="200">
                </div>

                <div class="ksv-form-group">
                    <label>Hình thức giảm giá cấu trúc</label>
                    <select class="ksv-form-select" th:field="*{loaiGiamGia}" required>
                        <option value="PHAN_TRAM">Khấu trừ theo Tỷ lệ phần trăm (%)</option>
                        <option value="TIEN_MAT">Khấu trừ theo Giá trị tiền mặt (₫)</option>
                    </select>
                </div>

                <div class="ksv-form-group">
                    <label>Mức giá trị giảm trừ thực tế</label>
                    <input class="ksv-form-input" th:field="*{giaTriGiam}" type="number" step="0.01"
                           placeholder="Nhập số phần trăm hoặc số tiền mặt..." required>
                </div>

                <div class="ksv-form-group">
                    <label>Thời điểm bắt đầu hiệu lực</label>
                    <input class="ksv-form-input" th:field="*{thoiGianBatDau}" type="datetime-local" required>
                </div>

                <div class="ksv-form-group">
                    <label>Thời điểm kết thúc hiệu lực</label>
                    <input class="ksv-form-input" th:field="*{thoiGianKetThuc}" type="datetime-local" required>
                </div>

                <div class="ksv-form-group">
                    <label>Tổng số lượng phát hành giới hạn (Lượt dùng)</label>
                    <input class="ksv-form-input" th:field="*{soLuongPhongGioiHan}" type="number" min="1"
                           placeholder="Bỏ trống nếu không giới hạn lượt dùng...">
                </div>

                <div class="ksv-form-group">
                    <label>Trạng thái hành chính chiến dịch</label>
                    <select class="ksv-form-select" th:field="*{trangThai}">
                        <option value="Đang diễn ra">Đang diễn ra (Khả dụng kích hoạt)</option>
                        <option value="Đã kết thúc">Đã kết thúc (Khóa áp dụng)</option>
                    </select>
                </div>

                <div class="ksv-form-group full-width checkbox-row">
                    <label class="ksv-checkbox-item">
                        <input type="checkbox" th:field="*{apDungChoPhong}">
                        <span>Cho phép khấu trừ hóa đơn tiền phòng</span>
                    </label>
                    <label class="ksv-checkbox-item">
                        <input type="checkbox" th:field="*{apDungChoDichVu}">
                        <span>Cho phép khấu trừ hóa đơn dịch vụ đi kèm</span>
                    </label>
                </div>

                <div class="ksv-form-group full-width">
                    <label>Nội dung tóm tắt mô tả chương trình khuyến mãi</label>
                    <textarea class="ksv-form-textarea" th:field="*{moTa}" rows="4"
                              placeholder="Nhập điều kiện áp dụng hoặc quyền lợi đi kèm chiến dịch..."
                              maxlength="500"></textarea>
                </div>
            </div>

            <div class="ksv-form-actions">
                <button class="ksv-btn-save" type="submit">
                    <i class="fa-solid fa-floppy-disk"></i> Phát hành chương trình khuyến mãi
                </button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
