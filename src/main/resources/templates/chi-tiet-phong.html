<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row">
        <!-- Phần hiển thị thông tin phòng -->
        <div class="col-md-7">
            <div class="card">
                <img th:if="${phong.hinhAnh != null}" th:src="${phong.hinhAnh}" class="card-img-top" alt="Hình ảnh phòng">
                <img th:unless="${phong.hinhAnh != null}" src="https://via.placeholder.com/800x400?text=Khach+San+Vui" class="card-img-top" alt="Hình ảnh phòng">
                <div class="card-body">
                    <h2 class="card-title" th:text="'Phòng ' + ${phong.soPhong} + ' - ' + ${phong.loaiPhong}">Phòng 101 - Phòng đơn</h2>
                    <h4 class="text-danger" th:text="${#numbers.formatDecimal(phong.giaPhong, 0, 'COMMA', 0, 'POINT')} + ' VNĐ/Đêm'">300,000 VNĐ</h4>
                    <hr>
                    <h5>Mô tả:</h5>
                    <p class="card-text" th:text="${phong.moTa}">Phòng đơn tiêu chuẩn</p>
                    <h5>Tiện nghi:</h5>
                    <p class="card-text" th:text="${phong.tienNghi}">Wifi, TV, Máy lạnh</p>
                </div>
            </div>
        </div>

        <!-- Phần Form Đặt phòng -->
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Đặt Phòng Ngay</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/dat-phong}" th:object="${datPhongDTO}" method="post">
                        <!-- Hidden field để gửi mã phòng -->
                        <input type="hidden" th:field="*{maPhong}" th:value="${phong.maPhong}" />
                        
                        <h6 class="text-primary mt-2">1. Thời gian lưu trú</h6>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label">Ngày nhận</label>
                                <input type="date" class="form-control" th:field="*{ngayNhan}" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Ngày trả</label>
                                <input type="date" class="form-control" th:field="*{ngayTra}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số lượng khách</label>
                            <input type="number" class="form-control" th:field="*{soLuongKhach}" min="1" value="1" required>
                        </div>

                        <h6 class="text-primary mt-4">2. Thông tin khách hàng</h6>
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" th:field="*{hoTen}" required placeholder="Vd: Nguyễn Văn A">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" class="form-control" th:field="*{soDienThoai}" required placeholder="Vd: 0901234567">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Căn cước công dân (Tùy chọn)</label>
                            <input type="text" class="form-control" th:field="*{cccd}" placeholder="Nhập số CCCD">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Email (Tùy chọn)</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="Vd: email@example.com">
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg">Xác Nhận Đặt Phòng</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
